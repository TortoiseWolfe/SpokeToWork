name: E2E Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: e2e-${{ github.ref }}
  # cancel-in-progress disabled: sequential browser execution takes ~45 min.
  # With cancel-in-progress, any push within that window kills the running
  # E2E mid-flight, cascading auth-setup cancellation to all browser batches.
  cancel-in-progress: false

env:
  # Shared env vars for all jobs
  NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
  NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ============================================
  # STEP 1: Build once, cache for all browsers
  # ============================================
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.16.1

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build application
        run: pnpm build
        env:
          GITHUB_ACTIONS: false
          NEXT_PUBLIC_E2E_TEST_MODE: 'true'
          NEXT_PUBLIC_EMAILJS_PUBLIC_KEY: ${{ secrets.EMAILJS_PUBLIC_KEY }}
          NEXT_PUBLIC_EMAILJS_SERVICE_ID: ${{ secrets.EMAILJS_SERVICE_ID }}
          NEXT_PUBLIC_EMAILJS_TEMPLATE_ID: ${{ secrets.EMAILJS_TEMPLATE_ID }}
          NEXT_PUBLIC_ORS_API_KEY: ${{ secrets.NEXT_PUBLIC_ORS_API_KEY }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v5
        with:
          name: build-output
          path: out/
          retention-days: 1

  # ============================================
  # STEP 2: Smoke tests (~2 min) - FAST FEEDBACK
  # ============================================
  smoke:
    name: Smoke Tests
    runs-on: ubuntu-latest
    needs: build
    # 10 min: 5 wasn't enough when SMOKE_ONLY cleanup (SQL deletes) runs on
    # a busy Supabase free tier — observed 4.5min stuck in cleanup alone on
    # run 24123867863. Cleanup + auth tests fit comfortably in 10 min.
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.16.1

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright (chromium only)
        run: pnpm exec playwright install --with-deps chromium

      - name: Download build
        uses: actions/download-artifact@v5
        with:
          name: build-output
          path: out/

      - name: Start server
        run: |
          npx http-server out -p 3000 -c-1 &
          npx wait-on http://localhost:3000 --timeout 60000

      - name: Run smoke tests
        run: |
          pnpm exec playwright test \
            tests/e2e/auth/protected-routes.spec.ts \
            tests/e2e/auth/sign-up.spec.ts \
            --project=chromium \
            --reporter=list \
            --timeout=30000
        env:
          CI: true
          SMOKE_ONLY: 'true'
          SKIP_WEBSERVER: true
          BASE_URL: http://localhost:3000
          NEXT_PUBLIC_E2E_TEST_MODE: 'true'
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TEST_USER_EMAIL: ${{ vars.TEST_USER_PRIMARY_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PRIMARY_PASSWORD }}
          TEST_USER_PRIMARY_EMAIL: ${{ vars.TEST_USER_PRIMARY_EMAIL }}
          TEST_USER_PRIMARY_PASSWORD: ${{ secrets.TEST_USER_PRIMARY_PASSWORD }}

      - name: Smoke test summary
        if: always()
        run: |
          echo "## 🚀 Smoke Tests Complete" >> $GITHUB_STEP_SUMMARY
          echo "Core auth and routing tests passed - proceeding to full suite." >> $GITHUB_STEP_SUMMARY

  # ============================================
  # STEP 3: Auth Setup (runs ONCE, shares state)
  # ============================================
  auth-setup:
    name: Auth Setup
    runs-on: ubuntu-latest
    needs: smoke
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.16.1

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright (chromium only for auth)
        run: pnpm exec playwright install --with-deps chromium

      - name: Download build
        uses: actions/download-artifact@v5
        with:
          name: build-output
          path: out/

      - name: Start server
        run: |
          npx http-server out -p 3000 -c-1 &
          npx wait-on http://localhost:3000 --timeout 60000

      - name: Run auth setup
        run: pnpm exec playwright test --project=setup --reporter=list
        env:
          CI: true
          SKIP_WEBSERVER: true
          BASE_URL: http://localhost:3000
          NEXT_PUBLIC_E2E_TEST_MODE: 'true'
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          E2E_ENCRYPTION_KEYS: ${{ secrets.E2E_ENCRYPTION_KEYS }}
          TEST_USER_PRIMARY_EMAIL: ${{ vars.TEST_USER_PRIMARY_EMAIL }}
          TEST_USER_PRIMARY_PASSWORD: ${{ secrets.TEST_USER_PRIMARY_PASSWORD }}
          TEST_USER_SECONDARY_EMAIL: ${{ vars.TEST_USER_SECONDARY_EMAIL }}
          TEST_USER_SECONDARY_PASSWORD: ${{ secrets.TEST_USER_SECONDARY_PASSWORD }}
          TEST_USER_TERTIARY_EMAIL: ${{ vars.TEST_USER_TERTIARY_EMAIL }}
          TEST_USER_TERTIARY_PASSWORD: ${{ secrets.TEST_USER_TERTIARY_PASSWORD }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Upload auth state
        uses: actions/upload-artifact@v5
        with:
          name: auth-state
          path: tests/e2e/fixtures/storage-state-auth.json
          retention-days: 1

  # ============================================
  # STEP 4a: Chromium E2E (7 shards, runs first)
  # ============================================
  # Sequential browser execution (ScriptHammer pattern): only one browser
  # hits Supabase at a time. Eliminates the 21-concurrent-shard contention
  # that caused auth rate_limit_attempts lockouts and DB connection timeouts.
  e2e-chromium:
    name: E2E (chromium ${{ matrix.group }}${{ matrix.shard }})
    runs-on: ubuntu-latest
    needs: [smoke, auth-setup]
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - { group: gen-, shard: 1/4 }
          - { group: gen-, shard: 2/4 }
          - { group: gen-, shard: 3/4 }
          - { group: gen-, shard: 4/4 }
          - { group: msg-, shard: 1/4 }
          - { group: msg-, shard: 2/4 }
          - { group: heavy-, shard: 1/4 }

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.16.1
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium
      - name: Download build
        uses: actions/download-artifact@v5
        with:
          name: build-output
          path: out/
      - name: Download auth state
        uses: actions/download-artifact@v5
        with:
          name: auth-state
          path: tests/e2e/fixtures/
      - name: Start server
        run: |
          npx http-server out -p 3000 -c-1 &
          npx wait-on http://localhost:3000 --timeout 60000
      - name: Prime Supabase connection pool
        env:
          SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        run: |
          curl -sf "${SUPABASE_URL}/rest/v1/user_profiles?select=id&limit=1" \
            -H "apikey: ${SUPABASE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_KEY}" \
            > /dev/null 2>&1 || true
      - name: Stagger shards
        env:
          MATRIX_SHARD: ${{ matrix.shard }}
        run: |
          SHARD_NUM=$(echo "$MATRIX_SHARD" | cut -d/ -f1)
          DELAY=$(((SHARD_NUM - 1) * 5))
          if [ "$DELAY" -gt 0 ]; then sleep $DELAY; fi
      - name: Extract shard index
        id: shard-index
        env:
          MATRIX_SHARD_VAL: ${{ matrix.shard }}
        run: |
          SHARD_NUM=$(echo "$MATRIX_SHARD_VAL" | cut -d/ -f1)
          echo "index=$SHARD_NUM" >> "$GITHUB_OUTPUT"
      - name: Run E2E tests (chromium ${{ matrix.group }}${{ matrix.shard }})
        run: |
          HEAVY_PATTERN="complete-flows|new-user-complete-flow|welcome-message|resume-upload"
          if [ "$E2E_GROUP" = "msg-" ]; then
            GREP_FLAG="--grep=messaging/|employer/"
            # msg shards need the setup project to run auth.setup.ts per-shard,
            # which injects pre-baked encryption keys into localStorage for
            # shard-specific users (e2e-s{N}-*). Without this, the browser
            # falls back to Argon2id derivation which times out on CI.
            NO_DEPS_FLAG=""
          elif [ "$E2E_GROUP" = "heavy-" ]; then
            GREP_FLAG="--grep=$HEAVY_PATTERN"
            NO_DEPS_FLAG="--no-deps"
          else
            GREP_FLAG="--grep-invert=messaging/|employer/|$HEAVY_PATTERN"
            NO_DEPS_FLAG="--no-deps"
          fi
          pnpm exec playwright test \
            --project=chromium \
            --shard=${{ matrix.shard }} \
            $GREP_FLAG \
            --reporter=blob \
            --trace=on-first-retry \
            $NO_DEPS_FLAG
        env:
          E2E_GROUP: ${{ matrix.group }}
          CI: true
          SKIP_WEBSERVER: true
          BASE_URL: http://localhost:3000
          DEBUG: pw:api
          NEXT_PUBLIC_E2E_TEST_MODE: 'true'
          E2E_SHARD_INDEX: ${{ matrix.group == 'msg-' && steps.shard-index.outputs.index || '' }}
          E2E_ENCRYPTION_KEYS: ${{ matrix.group == 'msg-' && secrets.E2E_ENCRYPTION_KEYS || '' }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TEST_USER_EMAIL: ${{ vars.TEST_USER_PRIMARY_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PRIMARY_PASSWORD }}
          TEST_USER_PRIMARY_EMAIL: ${{ vars.TEST_USER_PRIMARY_EMAIL }}
          TEST_USER_PRIMARY_PASSWORD: ${{ secrets.TEST_USER_PRIMARY_PASSWORD }}
          TEST_USER_SECONDARY_EMAIL: ${{ vars.TEST_USER_SECONDARY_EMAIL }}
          TEST_USER_SECONDARY_PASSWORD: ${{ secrets.TEST_USER_SECONDARY_PASSWORD }}
          TEST_USER_TERTIARY_EMAIL: ${{ vars.TEST_USER_TERTIARY_EMAIL }}
          TEST_USER_TERTIARY_PASSWORD: ${{ secrets.TEST_USER_TERTIARY_PASSWORD }}
      - name: Upload blob report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: blob-report-chromium-${{ matrix.group }}${{ strategy.job-index }}
          path: blob-report/
          retention-days: 1

  # ============================================
  # STEP 4b: Firefox E2E (waits for chromium)
  # ============================================
  e2e-firefox:
    name: E2E (firefox ${{ matrix.group }}${{ matrix.shard }})
    runs-on: ubuntu-latest
    needs: e2e-chromium
    if: always() && !cancelled() && github.event_name != 'pull_request'
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - { group: gen-, shard: 1/4 }
          - { group: gen-, shard: 2/4 }
          - { group: gen-, shard: 3/4 }
          - { group: gen-, shard: 4/4 }
          - { group: msg-, shard: 1/4 }
          - { group: msg-, shard: 2/4 }
          - { group: heavy-, shard: 1/4 }

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.16.1
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Install Playwright browsers
        run: |
          pnpm exec playwright install --with-deps firefox
          # msg shards omit --no-deps so auth.setup.ts runs per-shard.
          # auth.setup uses the 'setup' project which requires chromium.
          pnpm exec playwright install --with-deps chromium
      - name: Download build
        uses: actions/download-artifact@v5
        with:
          name: build-output
          path: out/
      - name: Download auth state
        uses: actions/download-artifact@v5
        with:
          name: auth-state
          path: tests/e2e/fixtures/
      - name: Start server
        run: |
          npx http-server out -p 3000 -c-1 &
          npx wait-on http://localhost:3000 --timeout 60000
      - name: Prime Supabase connection pool
        env:
          SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        run: |
          curl -sf "${SUPABASE_URL}/rest/v1/user_profiles?select=id&limit=1" \
            -H "apikey: ${SUPABASE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_KEY}" \
            > /dev/null 2>&1 || true
      - name: Stagger shards
        env:
          MATRIX_SHARD: ${{ matrix.shard }}
        run: |
          SHARD_NUM=$(echo "$MATRIX_SHARD" | cut -d/ -f1)
          DELAY=$(((SHARD_NUM - 1) * 5))
          if [ "$DELAY" -gt 0 ]; then sleep $DELAY; fi
      - name: Extract shard index
        id: shard-index
        env:
          MATRIX_SHARD_VAL: ${{ matrix.shard }}
        run: |
          SHARD_NUM=$(echo "$MATRIX_SHARD_VAL" | cut -d/ -f1)
          INDEX=$((SHARD_NUM + 4))
          echo "index=$INDEX" >> "$GITHUB_OUTPUT"
      - name: Run E2E tests (firefox ${{ matrix.group }}${{ matrix.shard }})
        run: |
          HEAVY_PATTERN="complete-flows|new-user-complete-flow|welcome-message|resume-upload"
          if [ "$E2E_GROUP" = "msg-" ]; then
            GREP_FLAG="--grep=messaging/|employer/"
            NO_DEPS_FLAG=""
          elif [ "$E2E_GROUP" = "heavy-" ]; then
            GREP_FLAG="--grep=$HEAVY_PATTERN"
            NO_DEPS_FLAG="--no-deps"
          else
            GREP_FLAG="--grep-invert=messaging/|employer/|$HEAVY_PATTERN"
            NO_DEPS_FLAG="--no-deps"
          fi
          pnpm exec playwright test \
            --project=firefox \
            --shard=${{ matrix.shard }} \
            $GREP_FLAG \
            --reporter=blob \
            --trace=on-first-retry \
            $NO_DEPS_FLAG
        env:
          E2E_GROUP: ${{ matrix.group }}
          CI: true
          SKIP_WEBSERVER: true
          BASE_URL: http://localhost:3000
          DEBUG: pw:api
          NEXT_PUBLIC_E2E_TEST_MODE: 'true'
          E2E_SHARD_INDEX: ${{ matrix.group == 'msg-' && steps.shard-index.outputs.index || '' }}
          E2E_ENCRYPTION_KEYS: ${{ matrix.group == 'msg-' && secrets.E2E_ENCRYPTION_KEYS || '' }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TEST_USER_EMAIL: ${{ vars.TEST_USER_PRIMARY_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PRIMARY_PASSWORD }}
          TEST_USER_PRIMARY_EMAIL: ${{ vars.TEST_USER_PRIMARY_EMAIL }}
          TEST_USER_PRIMARY_PASSWORD: ${{ secrets.TEST_USER_PRIMARY_PASSWORD }}
          TEST_USER_SECONDARY_EMAIL: ${{ vars.TEST_USER_SECONDARY_EMAIL }}
          TEST_USER_SECONDARY_PASSWORD: ${{ secrets.TEST_USER_SECONDARY_PASSWORD }}
          TEST_USER_TERTIARY_EMAIL: ${{ vars.TEST_USER_TERTIARY_EMAIL }}
          TEST_USER_TERTIARY_PASSWORD: ${{ secrets.TEST_USER_TERTIARY_PASSWORD }}
      - name: Upload blob report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: blob-report-firefox-${{ matrix.group }}${{ strategy.job-index }}
          path: blob-report/
          retention-days: 1

  # ============================================
  # STEP 4c: WebKit E2E (waits for firefox)
  # ============================================
  e2e-webkit:
    name: E2E (webkit ${{ matrix.group }}${{ matrix.shard }})
    runs-on: ubuntu-latest
    needs: e2e-firefox
    if: always() && !cancelled() && github.event_name != 'pull_request'
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - { group: gen-, shard: 1/4 }
          - { group: gen-, shard: 2/4 }
          - { group: gen-, shard: 3/4 }
          - { group: gen-, shard: 4/4 }
          - { group: msg-, shard: 1/4 }
          - { group: msg-, shard: 2/4 }
          - { group: heavy-, shard: 1/4 }

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.16.1
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Install Playwright browsers
        run: |
          pnpm exec playwright install --with-deps webkit
          # msg shards omit --no-deps so auth.setup.ts runs per-shard.
          # auth.setup uses the 'setup' project which requires chromium.
          pnpm exec playwright install --with-deps chromium
      - name: Download build
        uses: actions/download-artifact@v5
        with:
          name: build-output
          path: out/
      - name: Download auth state
        uses: actions/download-artifact@v5
        with:
          name: auth-state
          path: tests/e2e/fixtures/
      - name: Start server
        run: |
          npx http-server out -p 3000 -c-1 &
          npx wait-on http://localhost:3000 --timeout 60000
      - name: Prime Supabase connection pool
        env:
          SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        run: |
          curl -sf "${SUPABASE_URL}/rest/v1/user_profiles?select=id&limit=1" \
            -H "apikey: ${SUPABASE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_KEY}" \
            > /dev/null 2>&1 || true
      - name: Stagger shards
        env:
          MATRIX_SHARD: ${{ matrix.shard }}
        run: |
          SHARD_NUM=$(echo "$MATRIX_SHARD" | cut -d/ -f1)
          DELAY=$(((SHARD_NUM - 1) * 5))
          if [ "$DELAY" -gt 0 ]; then sleep $DELAY; fi
      - name: Extract shard index
        id: shard-index
        env:
          MATRIX_SHARD_VAL: ${{ matrix.shard }}
        run: |
          SHARD_NUM=$(echo "$MATRIX_SHARD_VAL" | cut -d/ -f1)
          INDEX=$((SHARD_NUM + 8))
          echo "index=$INDEX" >> "$GITHUB_OUTPUT"
      - name: Run E2E tests (webkit ${{ matrix.group }}${{ matrix.shard }})
        run: |
          HEAVY_PATTERN="complete-flows|new-user-complete-flow|welcome-message|resume-upload"
          if [ "$E2E_GROUP" = "msg-" ]; then
            GREP_FLAG="--grep=messaging/|employer/"
            NO_DEPS_FLAG=""
          elif [ "$E2E_GROUP" = "heavy-" ]; then
            GREP_FLAG="--grep=$HEAVY_PATTERN"
            NO_DEPS_FLAG="--no-deps"
          else
            GREP_FLAG="--grep-invert=messaging/|employer/|$HEAVY_PATTERN"
            NO_DEPS_FLAG="--no-deps"
          fi
          pnpm exec playwright test \
            --project=webkit \
            --shard=${{ matrix.shard }} \
            $GREP_FLAG \
            --reporter=blob \
            --trace=on-first-retry \
            $NO_DEPS_FLAG
        env:
          E2E_GROUP: ${{ matrix.group }}
          CI: true
          SKIP_WEBSERVER: true
          BASE_URL: http://localhost:3000
          DEBUG: pw:api
          NEXT_PUBLIC_E2E_TEST_MODE: 'true'
          E2E_SHARD_INDEX: ${{ matrix.group == 'msg-' && steps.shard-index.outputs.index || '' }}
          E2E_ENCRYPTION_KEYS: ${{ matrix.group == 'msg-' && secrets.E2E_ENCRYPTION_KEYS || '' }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TEST_USER_EMAIL: ${{ vars.TEST_USER_PRIMARY_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PRIMARY_PASSWORD }}
          TEST_USER_PRIMARY_EMAIL: ${{ vars.TEST_USER_PRIMARY_EMAIL }}
          TEST_USER_PRIMARY_PASSWORD: ${{ secrets.TEST_USER_PRIMARY_PASSWORD }}
          TEST_USER_SECONDARY_EMAIL: ${{ vars.TEST_USER_SECONDARY_EMAIL }}
          TEST_USER_SECONDARY_PASSWORD: ${{ secrets.TEST_USER_SECONDARY_PASSWORD }}
          TEST_USER_TERTIARY_EMAIL: ${{ vars.TEST_USER_TERTIARY_EMAIL }}
          TEST_USER_TERTIARY_PASSWORD: ${{ secrets.TEST_USER_TERTIARY_PASSWORD }}
      - name: Upload blob report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: blob-report-webkit-${{ matrix.group }}${{ strategy.job-index }}
          path: blob-report/
          retention-days: 1

  # ============================================
  # STEP 5: Merge reports and generate summary
  # ============================================
  report:
    name: Test Report
    runs-on: ubuntu-latest
    needs: [e2e-chromium, e2e-firefox, e2e-webkit]
    if: always()

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.16.1

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download blob reports
        uses: actions/download-artifact@v5
        with:
          pattern: blob-report-*
          path: all-blob-reports
          merge-multiple: true

      - name: Merge reports
        run: |
          pnpm exec playwright merge-reports --reporter=html,github ./all-blob-reports

      - name: Upload HTML report
        uses: actions/upload-artifact@v5
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Generate summary
        if: always()
        run: |
          echo "## 📊 E2E Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            echo "**PR Mode**: Chromium only (7 shards)" >> $GITHUB_STEP_SUMMARY
          else
            echo "**Full Mode**: Chromium -> Firefox -> WebKit (21 shards, sequential browsers)" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📁 Download the **playwright-report** artifact for detailed results." >> $GITHUB_STEP_SUMMARY
