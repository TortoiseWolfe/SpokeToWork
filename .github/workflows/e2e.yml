name: E2E Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

env:
  # Shared env vars for all jobs
  NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
  NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ============================================
  # STEP 1: Build once, cache for all browsers
  # ============================================
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.16.1

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build application
        run: pnpm build
        env:
          GITHUB_ACTIONS: false
          NEXT_PUBLIC_E2E_TEST_MODE: 'true'
          NEXT_PUBLIC_EMAILJS_PUBLIC_KEY: ${{ secrets.EMAILJS_PUBLIC_KEY }}
          NEXT_PUBLIC_EMAILJS_SERVICE_ID: ${{ secrets.EMAILJS_SERVICE_ID }}
          NEXT_PUBLIC_EMAILJS_TEMPLATE_ID: ${{ secrets.EMAILJS_TEMPLATE_ID }}
          NEXT_PUBLIC_ORS_API_KEY: ${{ secrets.NEXT_PUBLIC_ORS_API_KEY }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v5
        with:
          name: build-output
          path: out/
          retention-days: 1

  # ============================================
  # STEP 2: Smoke tests (~2 min) - FAST FEEDBACK
  # ============================================
  smoke:
    name: Smoke Tests
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.16.1

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright (chromium only)
        run: pnpm exec playwright install --with-deps chromium

      - name: Download build
        uses: actions/download-artifact@v5
        with:
          name: build-output
          path: out/

      - name: Start server
        run: |
          npx http-server out -p 3000 -c-1 &
          npx wait-on http://localhost:3000 --timeout 60000

      - name: Run smoke tests
        run: |
          pnpm exec playwright test \
            tests/e2e/auth/protected-routes.spec.ts \
            tests/e2e/auth/sign-up.spec.ts \
            --project=chromium \
            --reporter=list \
            --timeout=30000
        env:
          CI: true
          SMOKE_ONLY: 'true'
          SKIP_WEBSERVER: true
          BASE_URL: http://localhost:3000
          NEXT_PUBLIC_E2E_TEST_MODE: 'true'
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TEST_USER_EMAIL: ${{ vars.TEST_USER_PRIMARY_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PRIMARY_PASSWORD }}
          TEST_USER_PRIMARY_EMAIL: ${{ vars.TEST_USER_PRIMARY_EMAIL }}
          TEST_USER_PRIMARY_PASSWORD: ${{ secrets.TEST_USER_PRIMARY_PASSWORD }}

      - name: Smoke test summary
        if: always()
        run: |
          echo "## 🚀 Smoke Tests Complete" >> $GITHUB_STEP_SUMMARY
          echo "Core auth and routing tests passed - proceeding to full suite." >> $GITHUB_STEP_SUMMARY

  # ============================================
  # STEP 3: Auth Setup (runs ONCE, shares state)
  # ============================================
  auth-setup:
    name: Auth Setup
    runs-on: ubuntu-latest
    needs: smoke
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.16.1

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright (chromium only for auth)
        run: pnpm exec playwright install --with-deps chromium

      - name: Download build
        uses: actions/download-artifact@v5
        with:
          name: build-output
          path: out/

      - name: Start server
        run: |
          npx http-server out -p 3000 -c-1 &
          npx wait-on http://localhost:3000 --timeout 60000

      - name: Run auth setup
        run: pnpm exec playwright test --project=setup --reporter=list
        env:
          CI: true
          SKIP_WEBSERVER: true
          BASE_URL: http://localhost:3000
          NEXT_PUBLIC_E2E_TEST_MODE: 'true'
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          E2E_ENCRYPTION_KEYS: ${{ secrets.E2E_ENCRYPTION_KEYS }}
          TEST_USER_PRIMARY_EMAIL: ${{ vars.TEST_USER_PRIMARY_EMAIL }}
          TEST_USER_PRIMARY_PASSWORD: ${{ secrets.TEST_USER_PRIMARY_PASSWORD }}
          TEST_USER_SECONDARY_EMAIL: ${{ vars.TEST_USER_SECONDARY_EMAIL }}
          TEST_USER_SECONDARY_PASSWORD: ${{ secrets.TEST_USER_SECONDARY_PASSWORD }}
          TEST_USER_TERTIARY_EMAIL: ${{ vars.TEST_USER_TERTIARY_EMAIL }}
          TEST_USER_TERTIARY_PASSWORD: ${{ secrets.TEST_USER_TERTIARY_PASSWORD }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Upload auth state
        uses: actions/upload-artifact@v5
        with:
          name: auth-state
          path: tests/e2e/fixtures/storage-state-auth.json
          retention-days: 1

  # ============================================
  # STEP 4: Full E2E tests (sharded, parallel)
  # ============================================
  e2e:
    name: E2E (${{ matrix.browser }} ${{ matrix.group }}${{ matrix.shard }})
    runs-on: ubuntu-latest
    needs: [smoke, auth-setup]
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        # Only run chromium on PRs, all browsers on main/develop
        browser: ${{ github.event_name == 'pull_request' && fromJSON('["chromium"]') || fromJSON('["chromium", "firefox", "webkit"]') }}
        # Split into messaging (heavy, needs encryption+admin) and general (lightweight).
        # Playwright shards alphabetically, so messaging/* files clump into 1-2 shards
        # regardless of shard count. Grep-based split distributes them evenly.
        # Messaging: 76 tests in 11 files → 2 shards (38 each)
        # General:  442 tests in 69 files → 4 shards (~110 each)
        # Kept msg shards at 2 to avoid GoTrue rate limiting (12 concurrent sign-ins fail)
        group: [msg-, gen-]
        shard: [1/4, 2/4, 3/4, 4/4]
        exclude:
          - group: msg-
            shard: 3/4
          - group: msg-
            shard: 4/4

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.16.1

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: |
          # Always install chromium (required for auth setup project)
          pnpm exec playwright install --with-deps chromium
          # Install matrix browser if different from chromium
          if [ "${{ matrix.browser }}" != "chromium" ]; then
            pnpm exec playwright install --with-deps ${{ matrix.browser }}
          fi

      - name: Download build
        uses: actions/download-artifact@v5
        with:
          name: build-output
          path: out/

      - name: Download auth state
        uses: actions/download-artifact@v5
        with:
          name: auth-state
          path: tests/e2e/fixtures/

      - name: Start server
        run: |
          npx http-server out -p 3000 -c-1 &
          npx wait-on http://localhost:3000 --timeout 60000

      - name: Stagger browser shards to reduce Supabase Cloud contention
        env:
          MATRIX_SHARD: ${{ matrix.shard }}
          MATRIX_BROWSER: ${{ matrix.browser }}
        run: |
          SHARD_NUM=$(echo "$MATRIX_SHARD" | cut -d/ -f1)
          # Stagger shards to reduce concurrent Supabase Cloud connections.
          # Each shard gets SHARD_NUM * 5s base delay, browsers get extra offset.
          if [ "$MATRIX_BROWSER" = "firefox" ]; then
            DELAY=$((30 + SHARD_NUM * 5))
            echo "Firefox shard $SHARD_NUM: waiting ${DELAY}s"
            sleep $DELAY
          elif [ "$MATRIX_BROWSER" = "webkit" ]; then
            DELAY=$((60 + SHARD_NUM * 5))
            echo "WebKit shard $SHARD_NUM: waiting ${DELAY}s"
            sleep $DELAY
          else
            DELAY=$((SHARD_NUM * 5))
            if [ "$DELAY" -gt 0 ]; then
              echo "Chromium shard $SHARD_NUM: waiting ${DELAY}s"
              sleep $DELAY
            fi
          fi

      - name: Extract shard index
        id: shard-index
        env:
          MATRIX_SHARD_VAL: ${{ matrix.shard }}
          MATRIX_BROWSER: ${{ matrix.browser }}
        run: |
          SHARD_NUM=$(echo "$MATRIX_SHARD_VAL" | cut -d/ -f1)
          # Make shard index unique per browser to prevent cross-browser user conflicts.
          # chromium: shards 1-4, firefox: shards 5-8, webkit: shards 9-12
          if [ "$MATRIX_BROWSER" = "firefox" ]; then
            INDEX=$((SHARD_NUM + 4))
          elif [ "$MATRIX_BROWSER" = "webkit" ]; then
            INDEX=$((SHARD_NUM + 8))
          else
            INDEX=$SHARD_NUM
          fi
          echo "index=$INDEX" >> "$GITHUB_OUTPUT"

      - name: Run E2E tests (${{ matrix.group }}${{ matrix.shard }})
        run: |
          # messaging group: tests/e2e/messaging/ + tests/e2e/employer/
          # general group: everything else
          if [ "$E2E_GROUP" = "msg-" ]; then
            GREP_FLAG="--grep=messaging/|employer/"
          else
            GREP_FLAG="--grep-invert=messaging/|employer/"
          fi
          pnpm exec playwright test \
            --project=${{ matrix.browser }} \
            --shard=${{ matrix.shard }} \
            $GREP_FLAG \
            --reporter=blob \
            --trace=on-first-retry
        env:
          E2E_GROUP: ${{ matrix.group }}
          CI: true
          SKIP_WEBSERVER: true
          BASE_URL: http://localhost:3000
          DEBUG: pw:api
          NEXT_PUBLIC_E2E_TEST_MODE: 'true'
          # Only set shard index for messaging shards — gen shards use shared auth state
          E2E_SHARD_INDEX: ${{ matrix.group == 'msg-' && steps.shard-index.outputs.index || '' }}
          E2E_ENCRYPTION_KEYS: ${{ matrix.group == 'msg-' && secrets.E2E_ENCRYPTION_KEYS || '' }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TEST_USER_EMAIL: ${{ vars.TEST_USER_PRIMARY_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PRIMARY_PASSWORD }}
          TEST_USER_PRIMARY_EMAIL: ${{ vars.TEST_USER_PRIMARY_EMAIL }}
          TEST_USER_PRIMARY_PASSWORD: ${{ secrets.TEST_USER_PRIMARY_PASSWORD }}
          TEST_USER_SECONDARY_EMAIL: ${{ vars.TEST_USER_SECONDARY_EMAIL }}
          TEST_USER_SECONDARY_PASSWORD: ${{ secrets.TEST_USER_SECONDARY_PASSWORD }}
          TEST_USER_TERTIARY_EMAIL: ${{ vars.TEST_USER_TERTIARY_EMAIL }}
          TEST_USER_TERTIARY_PASSWORD: ${{ secrets.TEST_USER_TERTIARY_PASSWORD }}

      - name: Upload blob report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: blob-report-${{ matrix.browser }}-${{ matrix.group }}${{ strategy.job-index }}
          path: blob-report/
          retention-days: 1

  # ============================================
  # STEP 5: Merge reports and generate summary
  # ============================================
  report:
    name: Test Report
    runs-on: ubuntu-latest
    needs: e2e
    if: always()

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.16.1

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download blob reports
        uses: actions/download-artifact@v5
        with:
          pattern: blob-report-*
          path: all-blob-reports
          merge-multiple: true

      - name: Merge reports
        run: |
          pnpm exec playwright merge-reports --reporter=html,github ./all-blob-reports

      - name: Upload HTML report
        uses: actions/upload-artifact@v5
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Generate summary
        if: always()
        run: |
          echo "## 📊 E2E Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            echo "**PR Mode**: Chromium only (4 shards)" >> $GITHUB_STEP_SUMMARY
          else
            echo "**Full Mode**: Chromium + Firefox + WebKit (12 shards total)" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📁 Download the **playwright-report** artifact for detailed results." >> $GITHUB_STEP_SUMMARY
